<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordens de Serviço - LomanTrix OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#6366f1', darkBase: '#09090b', darkPanel: '#18181b', darkBorder: '#27272a' } } }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-darkBase text-zinc-200 min-h-screen flex tracking-wide font-light">

    <!-- Sidebar -->
    <aside class="w-64 bg-darkPanel border-r border-darkBorder flex flex-col transition-all duration-300">
        <div class="h-16 flex items-center justify-center border-b border-darkBorder">
            <h1 class="text-2xl font-bold text-primary"><i class="fa-solid fa-microchip"></i> LomanTrix</h1>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="dashboard.html" class="flex items-center p-3 text-zinc-400 hover:bg-zinc-800/50 hover:text-zinc-100 rounded-lg transition-colors">
                <i class="fa-solid fa-chart-line w-6"></i> Dashboard
            </a>
            <a href="os.html" class="flex items-center p-3 bg-zinc-800/50 text-primary rounded-lg transition-colors">
                <i class="fa-solid fa-clipboard-list w-6"></i> Ordens de Serviço
            </a>
            <a href="clientes.html" class="flex items-center p-3 text-zinc-400 hover:bg-zinc-800/50 hover:text-zinc-100 rounded-lg transition-colors">
                <i class="fa-solid fa-users w-6"></i> Clientes
            </a>
            <div id="adminMenu" class="hidden">
                <a href="#" class="flex items-center p-3 text-zinc-400 hover:bg-zinc-800/50 hover:text-zinc-100 rounded-lg transition-colors">
                    <i class="fa-solid fa-chart-pie w-6"></i> Relatórios
                </a>
                <a href="colaboradores.html" class="flex items-center p-3 text-zinc-400 hover:bg-zinc-800/50 hover:text-zinc-100 rounded-lg transition-colors">
                    <i class="fa-solid fa-user-tie w-6"></i> Colaboradores
                </a>
            </div>
        </nav>
        <div class="p-4 border-t border-darkBorder">
            <div class="flex items-center mb-4">
                <div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center font-bold text-white uppercase" id="userInitial">U</div>
                <div class="ml-3">
                    <p class="text-sm font-medium text-zinc-100" id="userNameDisplay">Usuário</p>
                    <p class="text-xs text-zinc-500" id="userRoleDisplay">Cargo</p>
                </div>
            </div>
            <button id="logoutBtn" class="w-full flex items-center justify-center p-2 text-sm text-red-400 border border-red-900/50 rounded-lg hover:bg-red-500/10 transition-colors">
                <i class="fa-solid fa-sign-out-alt mr-2"></i> Sair do Sistema
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="h-16 bg-darkPanel border-b border-darkBorder flex items-center justify-between px-6">
            <h2 class="text-xl font-semibold">Ordens de Serviço</h2>
        </header>

        <!-- Body -->
        <div class="flex-1 overflow-y-auto p-6 fade-in">
            <div class="flex justify-between items-center mb-6">
                <div class="relative w-72">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-search text-zinc-500"></i>
                    </div>
                    <input type="text" id="searchOS" class="bg-darkPanel border border-darkBorder text-zinc-200 rounded-lg focus:ring-primary focus:border-primary block w-full pl-10 p-2.5" placeholder="Buscar OS ou Cliente...">
                </div>
                
                <!-- O botão NOVA OS vai abrir o modal que faremos a seguir -->
                <button onclick="abrirModalOS()" class="bg-primary hover:bg-indigo-500 text-white px-4 py-2 rounded-lg font-medium transition-colors shadow-sm flex items-center">
                    <i class="fa-solid fa-plus mr-2"></i> Nova O.S.
                </button>
            </div>

            <!-- Tabela de OS -->
            <div class="bg-darkPanel border border-darkBorder rounded-xl overflow-hidden shadow-sm">
                <table class="w-full text-sm text-left text-zinc-400">
                    <thead class="text-xs text-zinc-300 uppercase bg-zinc-800/50 border-b border-darkBorder">
                        <tr>
                            <th scope="col" class="px-6 py-4">OS Nº</th>
                            <th scope="col" class="px-6 py-4">Cliente</th>
                            <th scope="col" class="px-6 py-4">Aparelho</th>
                            <th scope="col" class="px-6 py-4">Status</th>
                            <th scope="col" class="px-6 py-4">Valor</th>
                            <th scope="col" class="px-6 py-4">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaOS" class="divide-y divide-darkBorder">
                        <tr><td colspan="6" class="px-6 py-8 text-center text-zinc-500">Nenhuma Ordem de Serviço registrada.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module" src="../js/app.js"></script>
    <script type="module" src="../js/os.js"></script>
    <script>
        function abrirModalOS() {
            Swal.fire({ icon: 'info', title: 'Em construção', text: 'Vamos construir o modal completo do checklist a seguir!', background: '#18181b', color: '#fff'});
        }
    </script>
</body>
</html>
