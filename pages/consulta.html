<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LomanTrix - Área do Cliente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        darkBase: '#09090b',
                        darkPanel: '#18181b',
                        darkBorder: '#27272a'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-darkBase text-zinc-200 min-h-screen flex items-center justify-center tracking-wide font-light p-4">

    <div class="bg-darkPanel p-8 rounded-2xl shadow-xl w-full max-w-lg border border-darkBorder transition-all fade-in">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-zinc-800 border border-darkBorder mb-4 text-primary text-2xl">
                <i class="fa-solid fa-mobile-screen-button"></i>
            </div>
            <h1 class="text-2xl font-bold text-zinc-100 mb-1">Acompanhe seu Reparo</h1>
            <p class="text-zinc-500 text-sm">Digite o número da sua Ordem de Serviço ou CPF para ver o status em tempo real.</p>
        </div>

        <form id="formConsulta" class="space-y-6">
            <div>
                <div class="relative rounded-lg shadow-sm">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fa-solid fa-magnifying-glass text-zinc-500"></i>
                    </div>
                    <input type="text" id="buscaInput" required
                        class="bg-zinc-900 border border-darkBorder text-zinc-200 rounded-lg focus:ring-primary focus:border-primary block w-full pl-12 p-3.5 transition-colors" 
                        placeholder="Ex: OS-1001 ou 000.000.000-00">
                </div>
            </div>

            <button type="submit" class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-primary hover:bg-indigo-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary focus:ring-offset-darkBase transition-colors">
                Consultar Status
            </button>
        </form>

        <!-- Resultado da Busca -->
        <div id="resultadoBox" class="hidden mt-8 pt-6 border-t border-darkBorder fade-in">
            <div class="bg-zinc-800/30 rounded-lg p-5 border border-darkBorder">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <span class="text-xs font-semibold text-primary tracking-wider uppercase">Ordem de Serviço</span>
                        <h3 class="text-lg font-bold text-zinc-100" id="resOs">OS-0000</h3>
                    </div>
                    <span class="px-3 py-1 text-xs font-semibold text-amber-500 bg-amber-500/10 border border-amber-500/20 rounded-full" id="resStatus">
                        AGUARDANDO
                    </span>
                </div>
                
                <div class="space-y-3 text-sm">
                    <div class="flex justify-between border-b border-darkBorder pb-2">
                        <span class="text-zinc-500">Aparelho:</span>
                        <span class="text-zinc-200 font-medium" id="resAparelho">-</span>
                    </div>
                    <div class="flex justify-between border-b border-darkBorder pb-2">
                        <span class="text-zinc-500">Defeito Relatado:</span>
                        <span class="text-zinc-200 font-medium text-right max-w-[60%]" id="resDefeito">-</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-zinc-500">Previsão de Entrega:</span>
                        <span class="text-zinc-200 font-medium" id="resPrevisao">-</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center mt-8">
            <a href="../index.html" class="text-sm font-medium text-zinc-500 hover:text-zinc-300 transition-colors">
                <i class="fa-solid fa-lock mr-1"></i> Acesso Restrito (Funcionários)
            </a>
        </div>
    </div>

    <script type="module">
        import { db } from '../firebase/config.js';
        import { ref, get, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        document.getElementById('formConsulta').addEventListener('submit', async (e) => {
            e.preventDefault();
            const busca = document.getElementById('buscaInput').value;
            
            // Como a OS ainda não foi construída no DB, isso simula a visualização ou tenta buscar se existir
            Swal.fire({
                icon: 'info',
                title: 'Buscando...',
                text: 'Procurando informações da OS ' + busca,
                background: '#18181b',
                color: '#fff',
                timer: 1500,
                showConfirmButton: false
            }).then(() => {
                // Vamos forçar o resultado a aparecer para fins de demonstração
                document.getElementById('resultadoBox').classList.remove('hidden');
                document.getElementById('resOs').textContent = busca.toUpperCase();
                document.getElementById('resAparelho').textContent = "iPhone 13 Pro Max";
                document.getElementById('resDefeito').textContent = "Tela trincada / Não carrega";
                document.getElementById('resPrevisao').textContent = "28/10/2023";
            });
        });
    </script>
</body>
</html>
